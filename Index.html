<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Prompt Style Library</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #24231f;
      --muted: #74716a;
      --line: rgba(90, 84, 70, 0.18);
      --glass: rgba(255, 255, 255, 0.58);
      --paper: #f6f2ea;
      --paper-2: #ebe5da;
      --accent: #6b6557;
      --danger: #9a4b42;
      --shadow: 0 20px 70px rgba(88, 78, 58, 0.18);
      --radius: 8px;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Noto Sans TC", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 255, 255, 0.72), transparent 26rem),
        linear-gradient(135deg, var(--paper), var(--paper-2));
    }

    button, input, textarea { font: inherit; }
    button { border: 0; cursor: pointer; }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 36px 0 48px;
    }

    .topbar, .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-end;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.05;
      letter-spacing: 0;
      font-weight: 650;
    }

    .subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 680px;
    }

    .panel, .count-pill {
      border: 1px solid var(--line);
      background: var(--glass);
      backdrop-filter: blur(22px) saturate(150%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255, 255, 255, 0.82);
    }

    .count-pill {
      border-radius: 999px;
      padding: 10px 14px;
      color: var(--accent);
      white-space: nowrap;
    }

    .panel { border-radius: var(--radius); }

    .composer {
      display: grid;
      grid-template-columns: minmax(180px, 0.7fr) minmax(260px, 1.3fr) auto;
      gap: 12px;
      padding: 14px;
      margin-bottom: 14px;
    }

    .field { display: grid; gap: 7px; }
    label { color: var(--muted); font-size: 13px; }

    input, textarea {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      color: var(--ink);
      background: rgba(255, 255, 255, 0.58);
      outline: none;
    }

    input { height: 44px; padding: 0 12px; }
    textarea { min-height: 96px; resize: vertical; padding: 11px 12px; line-height: 1.6; }

    input:focus, textarea:focus {
      border-color: rgba(95, 90, 76, 0.48);
      box-shadow: 0 0 0 4px rgba(143, 138, 120, 0.12);
    }

    .primary {
      align-self: end;
      min-height: 44px;
      border-radius: var(--radius);
      padding: 0 18px;
      color: white;
      background: linear-gradient(135deg, #6b6557, #918b78);
      box-shadow: 0 10px 26px rgba(82, 76, 62, 0.22);
    }

    .search { max-width: 360px; }
    .status { color: var(--muted); font-size: 14px; min-height: 22px; }
    .list { display: grid; gap: 12px; }

    .card {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 0.78fr);
      gap: 14px;
      padding: 14px;
    }

    .meta, .actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .style-name {
      border-radius: 999px;
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.52);
      border: 1px solid var(--line);
      font-weight: 650;
    }

    .ghost, .danger {
      min-height: 34px;
      border-radius: var(--radius);
      padding: 0 10px;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.48);
      color: var(--accent);
    }

    .danger { color: var(--danger); }

    .prompt-text {
      margin: 12px 0 0;
      line-height: 1.72;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .preview {
      min-height: 150px;
      border: 1px solid rgba(90, 84, 70, 0.14);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      background: linear-gradient(160deg, var(--preview-a), var(--preview-b));
    }

    .preview::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 28%, rgba(255, 255, 255, 0.92), transparent 34%);
    }

    .preview span {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 12px;
      color: rgba(36, 35, 31, 0.78);
      font-size: 13px;
      line-height: 1.45;
      text-shadow: 0 1px 10px rgba(255, 255, 255, 0.72);
    }

    .empty { padding: 28px; text-align: center; color: var(--muted); }

    dialog {
      width: min(720px, calc(100% - 28px));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px;
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(24px) saturate(150%);
    }

    .dialog-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }

    @media (max-width: 820px) {
      .topbar, .toolbar { align-items: stretch; flex-direction: column; }
      .composer, .card { grid-template-columns: 1fr; }
      .search { max-width: none; }
      .primary { width: 100%; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="topbar">
      <div>
        <h1>Prompt Style Library</h1>
        <p class="subtitle">&#25910;&#38598;&#21487;&#29983;&#25104;&#21508;&#24335;&#22294;&#29255;&#39080;&#26684;&#30340; prompt&#12290;&#26410;&#22635;&#39080;&#26684;&#26178;&#26371;&#33258;&#21205;&#29986;&#29983; A/B/C &#24207;&#34399;&#12290;</p>
      </div>
      <div class="count-pill" id="countPill">0 prompts</div>
    </section>

    <form class="composer panel" id="promptForm">
      <div class="field">
        <label for="styleInput">Style</label>
        <input id="styleInput" type="text" placeholder="Watercolor, film, ukiyo-e">
      </div>
      <div class="field">
        <label for="promptInput">Prompt</label>
        <textarea id="promptInput" placeholder="Paste image generation prompt" required></textarea>
      </div>
      <button class="primary" type="submit">Add</button>
    </form>

    <section class="toolbar">
      <input class="search" id="searchInput" type="search" placeholder="Search style or prompt">
      <div class="status" id="status"></div>
    </section>

    <section class="list" id="list"></section>
  </main>

  <dialog id="editDialog">
    <form id="editForm">
      <input type="hidden" id="editRow">
      <div class="field">
        <label for="editStyle">Style</label>
        <input id="editStyle" type="text">
      </div>
      <div class="field">
        <label for="editPrompt">Prompt</label>
        <textarea id="editPrompt" required></textarea>
      </div>
      <div class="dialog-actions">
        <button class="ghost" type="button" id="cancelEdit">Cancel</button>
        <button class="primary" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script>
    const state = { items: [], query: '' };
    const listEl = document.querySelector('#list');
    const countPill = document.querySelector('#countPill');
    const statusEl = document.querySelector('#status');
    const promptForm = document.querySelector('#promptForm');
    const styleInput = document.querySelector('#styleInput');
    const promptInput = document.querySelector('#promptInput');
    const searchInput = document.querySelector('#searchInput');
    const editDialog = document.querySelector('#editDialog');
    const editForm = document.querySelector('#editForm');
    const editRow = document.querySelector('#editRow');
    const editStyle = document.querySelector('#editStyle');
    const editPrompt = document.querySelector('#editPrompt');

    promptForm.addEventListener('submit', event => {
      event.preventDefault();
      setStatus('Adding...');
      google.script.run
        .withSuccessHandler(() => {
          promptForm.reset();
          loadPrompts('Added.');
        })
        .withFailureHandler(showError)
        .addPrompt({ style: styleInput.value, prompt: promptInput.value });
    });

    searchInput.addEventListener('input', event => {
      state.query = event.target.value.trim().toLowerCase();
      render();
    });

    document.querySelector('#cancelEdit').addEventListener('click', () => editDialog.close());

    editForm.addEventListener('submit', event => {
      event.preventDefault();
      setStatus('Saving...');
      google.script.run
        .withSuccessHandler(() => {
          editDialog.close();
          loadPrompts('Saved.');
        })
        .withFailureHandler(showError)
        .updatePrompt({ row: Number(editRow.value), style: editStyle.value, prompt: editPrompt.value });
    });

    function loadPrompts(message = '') {
      setStatus('Loading...');
      google.script.run
        .withSuccessHandler(items => {
          state.items = Array.isArray(items) ? items : [];
          render();
          setStatus(message);
        })
        .withFailureHandler(showError)
        .getPrompts();
    }

    function render() {
      const items = filteredItems();
      countPill.textContent = `${state.items.length} prompts`;

      if (!items.length) {
        listEl.innerHTML = `<div class="panel empty">${state.items.length ? 'No matching prompts.' : 'No prompts yet.'}</div>`;
        return;
      }

      listEl.innerHTML = items.map(cardTemplate).join('');
      listEl.querySelectorAll('[data-copy]').forEach(button => button.addEventListener('click', () => copyPrompt(button.dataset.copy)));
      listEl.querySelectorAll('[data-edit]').forEach(button => button.addEventListener('click', () => openEditor(Number(button.dataset.edit))));
      listEl.querySelectorAll('[data-delete]').forEach(button => button.addEventListener('click', () => removePrompt(Number(button.dataset.delete))));
    }

    function filteredItems() {
      if (!state.query) return state.items;
      return state.items.filter(item => `${item.style} ${item.prompt}`.toLowerCase().includes(state.query));
    }

    function cardTemplate(item) {
      const colors = getPreviewColors(item.prompt + item.style);
      const prompt = escapeHtml(item.prompt);
      const style = escapeHtml(item.style || 'Untitled');
      const summary = escapeHtml(item.prompt.slice(0, 120));

      return `
        <article class="card panel">
          <div>
            <div class="meta">
              <div class="style-name">${style}</div>
              <div class="actions">
                <button class="ghost" type="button" data-copy="${encodeURIComponent(item.prompt)}">Copy</button>
                <button class="ghost" type="button" data-edit="${item.row}">Edit</button>
                <button class="danger" type="button" data-delete="${item.row}">Delete</button>
              </div>
            </div>
            <p class="prompt-text">${prompt}</p>
          </div>
          <div class="preview" style="--preview-a: ${colors[0]}; --preview-b: ${colors[1]};">
            <span>Prompt preview<br>${summary}</span>
          </div>
        </article>
      `;
    }

    function openEditor(row) {
      const item = state.items.find(entry => entry.row === row);
      if (!item) return;
      editRow.value = item.row;
      editStyle.value = item.style;
      editPrompt.value = item.prompt;
      editDialog.showModal();
    }

    function removePrompt(row) {
      if (!confirm('Delete this prompt?')) return;
      setStatus('Deleting...');
      google.script.run
        .withSuccessHandler(() => loadPrompts('Deleted.'))
        .withFailureHandler(showError)
        .deletePrompt(row);
    }

    async function copyPrompt(encodedPrompt) {
      const prompt = decodeURIComponent(encodedPrompt);
      await navigator.clipboard.writeText(prompt);
      setStatus('Copied.');
    }

    function getPreviewColors(seedText) {
      let hash = 0;
      for (let index = 0; index < seedText.length; index += 1) {
        hash = ((hash << 5) - hash) + seedText.charCodeAt(index);
        hash |= 0;
      }
      const hue = Math.abs(hash) % 360;
      return [`hsl(${hue} 42% 82%)`, `hsl(${(hue + 42) % 360} 32% 68%)`];
    }

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function setStatus(message = '') {
      statusEl.textContent = message;
      if (message) {
        window.clearTimeout(setStatus.timer);
        setStatus.timer = window.setTimeout(() => statusEl.textContent = '', 2600);
      }
    }

    function showError(error) {
      setStatus(error && error.message ? error.message : 'Something went wrong.');
    }

    loadPrompts();
  </script>
</body>
</html>
